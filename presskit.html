<!DOCTYPE HTML>
<html>
<head>
  <title>Jinnworks Press Kit</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="assets/css/main.css" />
  <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

  <style>
    .presskit{
      max-width:900px;
      margin:0 auto;
      padding:40px 20px;
      color:#FFD98A;
      font-family:'Share Tech Mono', monospace;
    }

    .nav{
      text-align:center;
      margin-bottom:40px;
    }

    .nav a{
      color:#FFA100;
      margin:0 10px;
      text-decoration:none;
    }

    .section{
      margin-bottom:40px;
      border-left:2px solid #FFA100;
      padding-left:15px;
    }

    h1, h2{
      color:#FFA100;
      font-family:'VT323', monospace;
      text-shadow:0 0 8px rgba(255,161,0,.4);
    }

    .meta{
      color:#C8A57A;
      line-height:1.6;
    }

    .screenshots{
      display:grid;
      grid-template-columns:1fr;
      gap:15px;
    }

    .screenshots img{
      width:100%;
      border:2px solid #FFA100;
    }

    .download-box{
      border:2px dashed #FFA100;
      padding:20px;
      text-align:center;
      margin-top:20px;
    }

    .download-box a{
      color:#FFA100;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="presskit">

  <!-- NAV -->
  <div class="nav">
    <a href="index.html">HOME</a>
    <a href="games.html">GAMES</a>
    <a href="presskit.html">PRESS KIT</a>
  </div>

  <h1>Press Kit?</h1>
  <p class="meta">
    I can't be bothered, just go here:<br>
    https://impress.games/press-kit/jinnworks<br>
  </p>

  

  <div class="section">
    <h2>CONTACT</h2>
    <p class="meta">
      jinnworks.dev@gmail.com
    </p>
  </div>

</div>

</body>
</html>
